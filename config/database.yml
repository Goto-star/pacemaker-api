default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "postgres") %>


development:
  <<: *default
  database: pacemaker_api_development

test:
  <<: *default
  database: pacemaker_api_test

production:
  primary: &primary_production
    <<: *default
    database: pacemaker_api_production
    username: pacemaker_api
    password: <%= ENV["PACEMAKER_API_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: pacemaker_api_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: pacemaker_api_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: pacemaker_api_production_cable
    migrations_paths: db/cable_migrate
